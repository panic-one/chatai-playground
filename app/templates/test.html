<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ホーム</title>

  <style>
    :root{
      --bg: #0b0f19;
      --panel: #0f1629;
      --panel2: #0c1324;
      --border: rgba(255,255,255,.10);
      --text: rgba(255,255,255,.92);
      --muted: rgba(255,255,255,.62);
      --muted2: rgba(255,255,255,.45);
      --bubble-user: rgba(255,255,255,.06);
      --bubble-ai: rgba(255,255,255,.10);
      --accent: #7c3aed;
      --shadow: 0 18px 50px rgba(0,0,0,.35);
      --radius: 14px;
      --danger: #ef4444;
    }

    *{ box-sizing: border-box; }
    html,body{ height: 100%; }
    body{
      margin:0;
      background: radial-gradient(1200px 600px at 30% -10%, rgba(124,58,237,.25), transparent 55%),
                  radial-gradient(900px 500px at 90% 10%, rgba(59,130,246,.20), transparent 55%),
                  var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans JP", sans-serif;
      overflow: hidden;
    }

    .app{
      height: 100svh;
      display: grid;
      grid-template-columns: 280px 1fr;
    }

    .sidebar{
      background: linear-gradient(180deg, var(--panel), var(--panel2));
      border-right: 1px solid var(--border);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: rgba(255,255,255,.03);
      box-shadow: var(--shadow);
    }
    .logo{
      width: 34px; height: 34px;
      border-radius: 10px;
      background: linear-gradient(135deg, rgba(124,58,237,.95), rgba(59,130,246,.95));
      display:grid;
      place-items:center;
      font-weight: 800;
      color: white;
      user-select: none;
    }
    .brand h1{
      margin:0;
      font-size: 14px;
      letter-spacing: .2px;
    }
    .brand p{
      margin:2px 0 0;
      font-size: 12px;
      color: var(--muted);
    }

    .sidebar-actions{
      display:flex;
      gap:10px;
    }
    .btn{
      appearance: none;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.04);
      color: var(--text);
      padding: 10px 12px;
      border-radius: 12px;
      cursor: pointer;
      transition: transform .08s ease, opacity .15s ease, background .15s ease;
      font-size: 13px;
      width: 100%;
    }
    .btn:hover{ opacity: .92; background: rgba(255,255,255,.06); }
    .btn:active{ transform: translateY(1px); }
    .btn.primary{
      border-color: rgba(124,58,237,.55);
      background: rgba(124,58,237,.18);
    }
    .btn.danger{
      border-color: rgba(239,68,68,.5);
      background: rgba(239,68,68,.12);
    }
    .btn.small{
      padding: 8px 10px;
      font-size: 12px;
      border-radius: 10px;
      width:auto;
    }

    .section-title{
      margin: 8px 2px 2px;
      font-size: 12px;
      color: var(--muted2);
      display:flex;
      align-items:center;
      justify-content: space-between;
      gap:10px;
    }

    .chat-list{
      display:flex;
      flex-direction: column;
      gap: 8px;
      overflow: auto;
      padding-right: 4px;
    }
    .chat-item{
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 12px;
      background: rgba(255,255,255,.03);
      cursor: pointer;
      transition: background .15s ease, border-color .15s ease;
    }
    .chat-item:hover{ background: rgba(255,255,255,.05); }
    .chat-item.active{
      border-color: rgba(124,58,237,.55);
      background: rgba(124,58,237,.10);
    }
    .chat-item .title{
      font-size: 13px;
      margin:0 0 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .chat-item .meta{
      font-size: 12px;
      margin:0;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .sidebar-footer{
      margin-top: auto;
      border-top: 1px solid var(--border);
      padding-top: 12px;
      color: var(--muted);
      font-size: 12px;
      display:flex;
      flex-direction: column;
      gap: 6px;
    }
    .uid{
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      color: rgba(255,255,255,.78);
      word-break: break-all;
      line-height: 1.3;
    }
    .status{
      font-size: 12px;
      color: var(--muted2);
      min-height: 16px;
    }
    .status.err{ color: rgba(239,68,68,.9); }

    .main{
      display:flex;
      flex-direction: column;
      height: 100%;
      min-width: 0;
    }

    .topbar{
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      display:flex;
      align-items:center;
      justify-content: space-between;
      gap: 12px;
      background: rgba(255,255,255,.02);
      backdrop-filter: blur(8px);
    }
    .topbar .title{
      font-size: 14px;
      color: var(--muted);
      margin:0;
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
    }
    .pill{
      font-size: 12px;
      padding: 4px 8px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: rgba(255,255,255,.03);
      color: var(--muted);
      white-space: nowrap;
    }
    .thread-title{
      color: rgba(255,255,255,.86);
      font-weight: 600;
      white-space: nowrap;
      overflow:hidden;
      text-overflow: ellipsis;
      max-width: 520px;
    }

    .chat{
      flex: 1;
      overflow: auto;
      padding: 18px 18px 10px;
    }
    .chat-inner{
      max-width: 920px;
      margin: 0 auto;
      display:flex;
      flex-direction: column;
      gap: 12px;
    }

    .msg{
      display:flex;
      gap: 10px;
      align-items:flex-start;
    }
    .avatar{
      width: 34px; height: 34px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.04);
      display:grid;
      place-items:center;
      font-size: 12px;
      color: rgba(255,255,255,.8);
      flex: 0 0 auto;
      user-select:none;
    }
    .bubble{
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px 14px;
      line-height: 1.55;
      box-shadow: 0 8px 26px rgba(0,0,0,.25);
      max-width: 100%;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .bubble.ai{ background: var(--bubble-ai); }
    .bubble.user{ background: var(--bubble-user); }
    .bubble .meta{
      margin-top: 6px;
      font-size: 11px;
      color: var(--muted2);
    }

    .composer{
      border-top: 1px solid var(--border);
      background: rgba(255,255,255,.02);
      padding: 12px 14px;
    }
    .composer-inner{
      max-width: 920px;
      margin: 0 auto;
      display:flex;
      gap: 10px;
      align-items:flex-end;
    }
    textarea{
      width: 100%;
      resize: none;
      min-height: 44px;
      max-height: 180px;
      padding: 12px 12px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.03);
      color: var(--text);
      outline: none;
      font-size: 14px;
      line-height: 1.4;
    }
    textarea:focus{
      border-color: rgba(124,58,237,.55);
      box-shadow: 0 0 0 3px rgba(124,58,237,.18);
    }
    .send{
      flex: 0 0 auto;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid rgba(124,58,237,.55);
      background: rgba(124,58,237,.22);
      color: var(--text);
      cursor:pointer;
      min-width: 70px;
    }
    .send[disabled]{
      opacity:.55;
      cursor:not-allowed;
    }
    .hint{
      max-width: 920px;
      margin: 8px auto 0;
      color: var(--muted2);
      font-size: 12px;
      padding: 0 2px;
      display:flex;
      justify-content: space-between;
      gap: 12px;
    }

    @media (max-width: 860px){
      body{ overflow:auto; }
      .app{ grid-template-columns: 1fr; }
      .sidebar{ display:none; }
      .main{ height: 100svh; }
    }
    
    .thread-row{
    display:flex;
    align-items:center;
    justify-content: space-between;
    gap: 10px;
    }

    .thread-text{
    min-width: 0;
    flex: 1 1 auto;
    }

    .thread-actions{
    flex: 0 0 auto;
    display:flex;
    gap: 8px;
    }

    .icon-btn{
    appearance:none;
    border: 1px solid var(--border);
    background: rgba(255,255,255,.04);
    color: rgba(255,255,255,.85);
    border-radius: 10px;
    padding: 6px 8px;
    cursor:pointer;
    line-height: 1;
    font-size: 13px;
    transition: opacity .15s ease, background .15s ease, transform .08s ease;
    }

    .icon-btn:hover{ opacity:.92; background: rgba(255,255,255,.06); }
    .icon-btn:active{ transform: translateY(1px); }

    .icon-btn.danger{
    border-color: rgba(239,68,68,.5);
    background: rgba(239,68,68,.10);
    }

  </style>
</head>

<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="logo">AI</div>
        <div>
          <h1>My Chat</h1>
          <p>ログイン成功 🎉</p>
        </div>
      </div>

      <div class="sidebar-actions">
        <button class="btn primary" onclick="newChat()">＋ 新しいチャット</button>
      </div>

      <div class="sidebar-actions">
        <button class="btn" onclick="reloadThreads()">更新</button>
        <button class="btn danger" onclick="logout()">ログアウト</button>
      </div>

      <div class="section-title">
        <span>スレッド</span>
        <span class="pill" id="threadCount">0</span>
      </div>

      <div class="chat-list" id="chatList"></div>

      <div class="status" id="sidebarStatus"></div>

      <div class="sidebar-footer">
        <div>あなたのUID</div>
        <div class="uid">{{ uid }}</div>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <p class="title">
          <span>チャット</span>
          <span class="pill" id="threadPill">未選択</span>
          <span class="thread-title" id="threadTitle"></span>
        </p>
        <div style="display:flex; gap:10px;">
          <button class="btn small" onclick="clearChat()">クリア</button>
        </div>
      </header>

      <section class="chat" id="chat">
        <div class="chat-inner" id="chatInner">
          <div class="msg">
            <div class="avatar">AI</div>
            <div class="bubble ai">
              左の「＋ 新しいチャット」からスレッドを作って、メッセージを送ってみて。
              <div class="meta">スレッドを選ぶと履歴を読み込みます。</div>
            </div>
          </div>
        </div>
      </section>

      <footer class="composer">
        <div class="composer-inner">
          <textarea id="input" placeholder="メッセージを入力… (Enterで送信 / Shift+Enterで改行)"></textarea>
          <button class="send" id="sendBtn" onclick="send()">送信</button>
        </div>
        <div class="hint">
          <span id="mainStatus">準備中…</span>
          <span>AIはポーリングで更新表示</span>
        </div>
      </footer>
    </main>
  </div>

  <script>
    const API_BASE = "/threads";

    const chatInner = document.getElementById("chatInner");
    const chat = document.getElementById("chat");
    const input = document.getElementById("input");
    const sendBtn = document.getElementById("sendBtn");

    const chatList = document.getElementById("chatList");
    const threadCount = document.getElementById("threadCount");
    const sidebarStatus = document.getElementById("sidebarStatus");
    const mainStatus = document.getElementById("mainStatus");

    const threadPill = document.getElementById("threadPill");
    const threadTitleEl = document.getElementById("threadTitle");

    let currentThread = null;
    const aiPollers = new Map();

    function scrollToBottom(){
      chat.scrollTop = chat.scrollHeight;
    }

    function setSidebarStatus(text, isErr=false){
      sidebarStatus.textContent = text || "";
      sidebarStatus.classList.toggle("err", !!isErr);
    }

    function setMainStatus(text, isErr=false){
      mainStatus.textContent = text || "";
      mainStatus.style.color = isErr ? "rgba(239,68,68,.9)" : "rgba(255,255,255,.55)";
    }

    function safeJson(res){
      return res.text().then(t => {
        try { return t ? JSON.parse(t) : {}; }
        catch { return { _raw: t }; }
      });
    }

    async function apiFetch(path, options={}){
      const res = await fetch(path, {
        credentials: "include",
        headers: {
          "Content-Type": "application/json",
          ...(options.headers || {}),
        },
        ...options,
      });
      const body = await safeJson(res);
      if(!res.ok){
        const msg = body?.error || body?.message || res.statusText || "Request failed";
        const err = new Error(msg);
        err.status = res.status;
        err.body = body;
        throw err;
      }
      return body;
    }

    function roleLabel(role){
      if(role === "user") return { avatar: "You", css: "user" };
      return { avatar: "AI", css: "ai" };
    }

    function clearChat(){
      chatInner.innerHTML = "";
      stopAllPollers();
    }

    function stopAllPollers(){
      for(const [mid, timer] of aiPollers.entries()){
        clearInterval(timer);
        aiPollers.delete(mid);
      }
    }

    function appendMessage(msg){
      const role = msg.role || "ai";
      const text = msg.content ?? "";
      const { avatar: av, css } = roleLabel(role);

      const wrap = document.createElement("div");
      wrap.className = "msg";

      const mid = String(msg.message_id ?? msg.id ?? "");
      if(mid) wrap.dataset.messageId = mid;

      const avatar = document.createElement("div");
      avatar.className = "avatar";
      avatar.textContent = av;

      const bubble = document.createElement("div");
      bubble.className = "bubble " + css;

      const content = document.createElement("div");
      content.className = "content";
      content.textContent = text;

      bubble.appendChild(content);

      const meta = document.createElement("div");
      meta.className = "meta";
      const parts = [];
      if(msg.model) parts.push(`model: ${msg.model}`);
      if(msg.message_index != null) parts.push(`#${msg.message_index}`);
      if(msg.created_at) parts.push(msg.created_at);
      if(parts.length){
        meta.textContent = parts.join(" / ");
        bubble.appendChild(meta);
      }

      wrap.appendChild(avatar);
      wrap.appendChild(bubble);
      chatInner.appendChild(wrap);
      scrollToBottom();
    }

    function updateMessageContent(messageId, newText){
      const el = chatInner.querySelector(`.msg[data-message-id="${CSS.escape(messageId)}"] .bubble .content`);
      if(el) el.textContent = newText ?? "";
      scrollToBottom();
    }

    function renderThreadList(threads){
    chatList.innerHTML = "";
    threadCount.textContent = String(threads.length);

    threads.forEach(th => {
        const item = document.createElement("div");
        item.className = "chat-item";

        const tid = th.thread_id ?? th.id;

        if(currentThread && (currentThread.thread_id ?? currentThread.id) === tid){
        item.classList.add("active");
        }

        // row
        const row = document.createElement("div");
        row.className = "thread-row";

        const textBox = document.createElement("div");
        textBox.className = "thread-text";

        const title = document.createElement("p");
        title.className = "title";
        title.textContent = th.title || "(no title)";

        const meta = document.createElement("p");
        meta.className = "meta";
        meta.textContent = `id: ${tid}`;

        textBox.appendChild(title);
        textBox.appendChild(meta);

        // actions
        const actions = document.createElement("div");
        actions.className = "thread-actions";

        const delBtn = document.createElement("button");
        delBtn.className = "icon-btn danger";
        delBtn.type = "button";
        delBtn.title = "削除";
        delBtn.textContent = "🗑";

        // ★ここ重要：削除ボタン押したら、スレッド選択クリックが発火しないようにする
        delBtn.addEventListener("click", async (e) => {
        e.stopPropagation();
        await deleteThread(tid);
        });

        actions.appendChild(delBtn);

        row.appendChild(textBox);
        row.appendChild(actions);
        item.appendChild(row);

        item.addEventListener("click", async () => {
        [...chatList.querySelectorAll(".chat-item")].forEach(x => x.classList.remove("active"));
        item.classList.add("active");
        await selectThread(th);
        });

        chatList.appendChild(item);
    });

    if(!threads.length){
        const empty = document.createElement("div");
        empty.className = "chat-item";
        empty.style.opacity = "0.8";
        empty.innerHTML = `<p class="title">スレッドがありません</p><p class="meta">「＋ 新しいチャット」で作成できます</p>`;
        chatList.appendChild(empty);
    }
    }

    async function reloadThreads(){
      try{
        setSidebarStatus("スレッド取得中…");
        const threads = await apiFetch(`${API_BASE}`, { method: "GET" });
        renderThreadList(threads);
        setSidebarStatus("");
      }catch(err){
        console.error(err);
        setSidebarStatus(`取得失敗: ${err.message}`, true);
      }
    }

    async function deleteThread(tid){
    if(!tid) return;

    const ok = confirm(`このスレッド(id:${tid})を削除しますか？`);
    if(!ok) return;

    try{
        setSidebarStatus("削除中…");

        // DELETE /threads/<id>
        await apiFetch(`${API_BASE}/${tid}`, { method: "DELETE" });

        // もし今見てるスレッドを消したなら、右側クリアして未選択に戻す
        const curId = currentThread ? (currentThread.thread_id ?? currentThread.id) : null;
        if(curId === tid){
        currentThread = null;
        threadPill.textContent = "未選択";
        threadTitleEl.textContent = "";
        clearChat();
        appendMessage({ role:"ai", content:"スレッドを削除しました。左から別のスレッドを選んでね。" });
        setMainStatus("準備OK（スレッドを選択してね）");
        }

        await reloadThreads();
        setSidebarStatus("");
    }catch(err){
        console.error(err);
        setSidebarStatus(`削除失敗: ${err.message}`, true);
        alert(`削除に失敗: ${err.message}`);
    }
    }

    async function newChat(){
      try{
        setSidebarStatus("作成中…");
        const th = await apiFetch(`${API_BASE}`, {
          method: "POST",
          body: JSON.stringify({ title: "" }),
        });
        await reloadThreads();
        await selectThread(th);
        setSidebarStatus("");
      }catch(err){
        console.error(err);
        setSidebarStatus(`作成失敗: ${err.message}`, true);
      }
    }

    async function selectThread(th){
      currentThread = th;
      const tid = th.thread_id ?? th.id;

      threadPill.textContent = tid ? `thread_id: ${tid}` : "未選択";
      threadTitleEl.textContent = th?.title ? `— ${th.title}` : "";

      clearChat();
      appendMessage({ role: "ai", content: "履歴を読み込み中…" });

      try{
        setMainStatus("履歴取得中…");
        const msgs = await apiFetch(`${API_BASE}/${tid}/messages?limit=200&offset=0`, { method: "GET" });

        clearChat();
        if(!Array.isArray(msgs) || msgs.length === 0){
          appendMessage({ role: "ai", content: "このスレッドはまだメッセージがありません。下から送ってみて。" });
          setMainStatus("準備OK");
          return;
        }

        msgs.sort((a,b) => {
          const ai = (a.message_index ?? 0) - (b.message_index ?? 0);
          if(ai !== 0) return ai;
          return (a.message_id ?? 0) - (b.message_id ?? 0);
        });

        for(const m of msgs){
          appendMessage(m);
          if((m.role || "ai") !== "user"){
            const mid = String(m.message_id ?? m.id ?? "");
            if(mid && !shouldStopPolling(m.content || "")){
              startAiPolling(String(tid), mid);
            }
          }
        }

        setMainStatus("準備OK");
      }catch(err){
        console.error(err);
        clearChat();
        appendMessage({ role: "ai", content: `履歴取得に失敗: ${err.message}` });
        setMainStatus(`履歴取得失敗: ${err.message}`, true);
      }
    }

    function shouldStopPolling(text){
      return (text || "").includes("回答が完成しました");
    }

    function startAiPolling(threadId, messageId){
      if(aiPollers.has(messageId)) return;

      let last = null;
      let ticks = 0;

      const timer = setInterval(async () => {
        ticks += 1;
        try{
          const msg = await apiFetch(`${API_BASE}/${threadId}/messages/${messageId}`, { method: "GET" });
          const text = msg.content ?? "";
          if(text !== last){
            updateMessageContent(String(messageId), text);
            last = text;
          }
          if(shouldStopPolling(text) || ticks > 240){
            clearInterval(timer);
            aiPollers.delete(messageId);
          }
        }catch(err){
          console.warn("poll error:", err.message);
          if(ticks > 240){
            clearInterval(timer);
            aiPollers.delete(messageId);
          }
        }
      }, 700);

      aiPollers.set(messageId, timer);
    }

    async function send(){
      const text = input.value.trim();
      if(!text) return;

      if(!currentThread){
        alert("先にスレッドを作って選択してね（左の＋）");
        return;
      }

      const tid = currentThread.thread_id ?? currentThread.id;
      if(!tid){
        alert("thread_id が取れない…");
        return;
      }

      sendBtn.disabled = true;
      setMainStatus("送信中…");

      try{
        appendMessage({ role: "user", content: text });

        input.value = "";
        scrollToBottom();

        const res = await apiFetch(`${API_BASE}/${tid}/messages`, {
          method: "POST",
          body: JSON.stringify({ content: text }),
        });

        const ai = res.ai;
        if(ai){
          appendMessage(ai);

          const mid = String(ai.message_id ?? ai.id ?? "");
          if(mid){
            startAiPolling(String(tid), mid);
          }
        }

        sendBtn.disabled = false;
        setMainStatus("送信完了");
      }catch(err){
        console.error(err);
        sendBtn.disabled = false;
        setMainStatus(`送信失敗: ${err.message}`, true);
        alert(`送信に失敗: ${err.message}`);
      }
    }

    function logout() {
      fetch("/auth/logout", {
        method: "POST",
        credentials: "include",
      }).then((response) => {
        if (!response.ok) throw new Error("Logout request failed with status:" + response.status);
        window.location.href = "/auth/login";
      }).catch((error) => {
        console.error("Logout failed:", error);
        alert("ログアウトに失敗しました。時間をおいて再度お試しください。");
      });
    }

    input.addEventListener("keydown", (e) => {
      if(e.key === "Enter" && !e.shiftKey){
        e.preventDefault();
        send();
      }
    });

    (async () => {
      await reloadThreads();
      setMainStatus("準備OK（スレッドを選択してね）");
    })();
  </script>
</body>
</html>
