<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Login</title>

    <link type="text/css" rel="stylesheet"
      href="https://www.gstatic.com/firebasejs/ui/6.0.2/firebase-ui-auth.css" />
  </head>
  <body>
    <h1>ログイン</h1>
    <div id="firebaseui-auth-container"></div>
    <div id="loader">Loading...</div>

    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>

    <script src="https://www.gstatic.com/firebasejs/ui/6.0.2/firebase-ui-auth__ja.js"></script>

    <script>
      const firebaseConfig = {
        apiKey: "AIzaSyBgpRpnqsvLDnWrgffQeEaU-2I5BFHPJTk",
        authDomain: "chatai-playground.firebaseapp.com",
        projectId: "chatai-playground",
        appId: "1:747369968863:web:75b240f4ca396c20bfe56a",
        messagingSenderId: "747369968863",
        appId: "1:747369968863:web:75b240f4ca396c20bfe56a"
      };

      firebase.initializeApp(firebaseConfig);

      const ui = new firebaseui.auth.AuthUI(firebase.auth());

      const uiConfig = {
        callbacks: {
          signInSuccessWithAuthResult: function(authResult, redirectUrl) {
            return true;
          },
          uiShown: function() {
            document.getElementById('loader').style.display = 'none';
          }
        },

        signInSuccessUrl: "/",

        signInOptions: [
          firebase.auth.EmailAuthProvider.PROVIDER_ID,
          firebase.auth.GoogleAuthProvider.PROVIDER_ID,
        ],

      };

      ui.start('#firebaseui-auth-container', uiConfig);
    </script>
  </body>
</html>
