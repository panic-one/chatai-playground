<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ホーム</title>

  <style>
    body {
      margin: 0;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans JP", sans-serif;
      background: #f6f7fb;
    }

    .card {
      background: #fff;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 18px 50px rgba(0,0,0,.10);
      width: min(420px, 90%);
      text-align: center;
    }

    h1 {
      margin-bottom: 10px;
    }

    p {
      color: #6b7280;
      font-size: 14px;
      margin-bottom: 20px;
    }

    button {
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      background: #111827;
      color: white;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.85;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>ログイン成功 🎉</h1>
    <p>あなたのUID:</p>
    <p><strong>{{ uid }}</strong></p>

    <button onclick="logout()">ログアウト</button>
  </div>

  <script>
    function logout() {
      fetch("/logout", {
        method: "POST",
        credentials: "include",
      }).then(() => {
        window.location.href = "/login";
      });
    }
  </script>
</body>
</html>
