<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ホーム</title>

  <style>
    :root{
      --bg: #0b0f19;
      --panel: #0f1629;
      --panel2: #0c1324;
      --border: rgba(255,255,255,.10);
      --text: rgba(255,255,255,.92);
      --muted: rgba(255,255,255,.62);
      --muted2: rgba(255,255,255,.45);
      --bubble-user: rgba(255,255,255,.06);
      --bubble-ai: rgba(255,255,255,.10);
      --accent: #7c3aed;
      --shadow: 0 18px 50px rgba(0,0,0,.35);
      --radius: 14px;
    }

    *{ box-sizing: border-box; }
    html,body{ height: 100%; }
    body{
      margin:0;
      background: radial-gradient(1200px 600px at 30% -10%, rgba(124,58,237,.25), transparent 55%),
                  radial-gradient(900px 500px at 90% 10%, rgba(59,130,246,.20), transparent 55%),
                  var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans JP", sans-serif;
      overflow: hidden;
    }

    /* App Layout */
    .app{
      height: 100svh;
      display: grid;
      grid-template-columns: 280px 1fr;
    }

    /* Sidebar */
    .sidebar{
      background: linear-gradient(180deg, var(--panel), var(--panel2));
      border-right: 1px solid var(--border);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: rgba(255,255,255,.03);
      box-shadow: var(--shadow);
    }
    .logo{
      width: 34px; height: 34px;
      border-radius: 10px;
      background: linear-gradient(135deg, rgba(124,58,237,.95), rgba(59,130,246,.95));
      display:grid;
      place-items:center;
      font-weight: 800;
      color: white;
      user-select: none;
    }
    .brand h1{
      margin:0;
      font-size: 14px;
      letter-spacing: .2px;
    }
    .brand p{
      margin:2px 0 0;
      font-size: 12px;
      color: var(--muted);
    }

    .sidebar-actions{
      display:flex;
      gap:10px;
    }
    .btn{
      appearance: none;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.04);
      color: var(--text);
      padding: 10px 12px;
      border-radius: 12px;
      cursor: pointer;
      transition: transform .08s ease, opacity .15s ease, background .15s ease;
      font-size: 13px;
      width: 100%;
    }
    .btn:hover{ opacity: .92; background: rgba(255,255,255,.06); }
    .btn:active{ transform: translateY(1px); }
    .btn.primary{
      border-color: rgba(124,58,237,.55);
      background: rgba(124,58,237,.18);
    }

    .section-title{
      margin: 8px 2px 2px;
      font-size: 12px;
      color: var(--muted2);
    }

    .chat-list{
      display:flex;
      flex-direction: column;
      gap: 8px;
      overflow: auto;
      padding-right: 4px;
    }
    .chat-item{
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 12px;
      background: rgba(255,255,255,.03);
      cursor: pointer;
    }
    .chat-item:hover{ background: rgba(255,255,255,.05); }
    .chat-item .title{
      font-size: 13px;
      margin:0 0 2px;
    }
    .chat-item .meta{
      font-size: 12px;
      margin:0;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .sidebar-footer{
      margin-top: auto;
      border-top: 1px solid var(--border);
      padding-top: 12px;
      color: var(--muted);
      font-size: 12px;
      display:flex;
      flex-direction: column;
      gap: 6px;
    }
    .uid{
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      color: rgba(255,255,255,.78);
      word-break: break-all;
      line-height: 1.3;
    }

    /* Main */
    .main{
      display:flex;
      flex-direction: column;
      height: 100%;
      min-width: 0;
    }

    .topbar{
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      display:flex;
      align-items:center;
      justify-content: space-between;
      gap: 12px;
      background: rgba(255,255,255,.02);
      backdrop-filter: blur(8px);
    }
    .topbar .title{
      font-size: 14px;
      color: var(--muted);
      margin:0;
    }

    .chat{
      flex: 1;
      overflow: auto;
      padding: 18px 18px 10px;
    }
    .chat-inner{
      max-width: 920px;
      margin: 0 auto;
      display:flex;
      flex-direction: column;
      gap: 12px;
    }

    .msg{
      display:flex;
      gap: 10px;
      align-items:flex-start;
    }
    .avatar{
      width: 34px; height: 34px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.04);
      display:grid;
      place-items:center;
      font-size: 12px;
      color: rgba(255,255,255,.8);
      flex: 0 0 auto;
      user-select:none;
    }
    .bubble{
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px 14px;
      line-height: 1.55;
      box-shadow: 0 8px 26px rgba(0,0,0,.25);
      max-width: 100%;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .bubble.ai{ background: var(--bubble-ai); }
    .bubble.user{ background: var(--bubble-user); }

    .composer{
      border-top: 1px solid var(--border);
      background: rgba(255,255,255,.02);
      padding: 12px 14px;
    }
    .composer-inner{
      max-width: 920px;
      margin: 0 auto;
      display:flex;
      gap: 10px;
      align-items:flex-end;
    }
    textarea{
      width: 100%;
      resize: none;
      min-height: 44px;
      max-height: 180px;
      padding: 12px 12px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.03);
      color: var(--text);
      outline: none;
      font-size: 14px;
      line-height: 1.4;
    }
    textarea:focus{
      border-color: rgba(124,58,237,.55);
      box-shadow: 0 0 0 3px rgba(124,58,237,.18);
    }
    .send{
      flex: 0 0 auto;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid rgba(124,58,237,.55);
      background: rgba(124,58,237,.22);
      color: var(--text);
      cursor:pointer;
    }
    .send:hover{ opacity:.92; }
    .hint{
      max-width: 920px;
      margin: 8px auto 0;
      color: var(--muted2);
      font-size: 12px;
      padding: 0 2px;
    }

    /* Mobile */
    @media (max-width: 860px){
      body{ overflow:auto; }
      .app{ grid-template-columns: 1fr; }
      .sidebar{ display:none; }
      .main{ height: 100svh; }
    }
  </style>
</head>

<body>
  <div class="app">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="brand">
        <div class="logo">AI</div>
        <div>
          <h1>My Chat</h1>
          <p>ログイン成功 🎉</p>
        </div>
      </div>

      <div class="sidebar-actions">
        <button class="btn primary" onclick="newChat()">＋ 新しいチャット</button>
      </div>

      <div class="sidebar-actions">
        <button class="btn" onclick="logout()">ログアウト</button>
      </div>

      <div class="section-title">最近のチャット（ダミー）</div>
      <div class="chat-list" id="chatList">
        <div class="chat-item" onclick="loadDummy(1)">
          <p class="title">Flask + Firebase 認証</p>
          <p class="meta">セッション / JWT / Cookie の話</p>
        </div>
        <div class="chat-item" onclick="loadDummy(2)">
          <p class="title">LLM API 切り替え</p>
          <p class="meta">レート制限時のフォールバック</p>
        </div>
        <div class="chat-item" onclick="loadDummy(3)">
          <p class="title">明日の天気は</p>
          <p class="meta">明日の天気</p>
        </div>
      </div>

      <div class="sidebar-footer">
        <div>あなたのUID</div>
        <div class="uid">{{ uid }}</div>
      </div>
    </aside>

    <!-- Main -->
    <main class="main">
      <header class="topbar">
        <p class="title">チャット</p>
        <div style="display:flex; gap:10px;">
          <button class="btn" style="width:auto;" onclick="clearChat()">クリア</button>
        </div>
      </header>

      <section class="chat" id="chat">
        <div class="chat-inner" id="chatInner">
          <div class="msg">
            <div class="avatar">AI</div>
            <div class="bubble ai">こんにちは！右下の入力欄からメッセージを送ってみて。</div>
          </div>
          <div class="msg">
            <div class="avatar">You</div>
            <div class="bubble user">まずは UI を ChatGPT っぽくしたい</div>
          </div>
          <div class="msg">
            <div class="avatar">AI</div>
            <div class="bubble ai">OK。左にサイドバー、右にチャット、下に入力欄の構成にしてあるよ。</div>
          </div>
        </div>
      </section>

      <footer class="composer">
        <div class="composer-inner">
          <textarea id="input" placeholder="メッセージを入力… (Enterで送信 / Shift+Enterで改行)"></textarea>
          <button class="send" onclick="send()">送信</button>
        </div>
        <div class="hint">※ これはフロント側だけの見た目です（送信先APIは未接続）。</div>
      </footer>
    </main>

  </div>

  <script>
    // --- logout (既存仕様) ---
    function logout() {
      fetch("/auth/logout", {
        method: "POST",
        credentials: "include",
      }).then((response) => {
        if (!response.ok) {
          throw new Error("Logout request failed with status:" + response.status);
        }
        window.location.href = "/auth/login";
      })
      .catch((error) => {
        console.error("Logout failed:", error);
        alert("ログアウトに失敗しました。時間をおいて再度お試しください。");
      });
    }

    // --- UI demo (ダミー) ---
    const chatInner = document.getElementById("chatInner");
    const chat = document.getElementById("chat");
    const input = document.getElementById("input");

    function scrollToBottom(){
      chat.scrollTop = chat.scrollHeight;
    }

    function appendMessage(role, text){
      const wrap = document.createElement("div");
      wrap.className = "msg";

      const avatar = document.createElement("div");
      avatar.className = "avatar";
      avatar.textContent = role === "ai" ? "AI" : "You";

      const bubble = document.createElement("div");
      bubble.className = "bubble " + (role === "ai" ? "ai" : "user");
      bubble.textContent = text;

      wrap.appendChild(avatar);
      wrap.appendChild(bubble);
      chatInner.appendChild(wrap);
      scrollToBottom();
    }

    function send(){
      const text = input.value.trim();
      if(!text) return;
      appendMessage("user", text);
      input.value = "";

      // ここで本来は /api/chat などに POST してレスを表示する
      // デモとして AI っぽい返答を入れる
      setTimeout(() => {
        appendMessage("ai", "（デモ）受け取ったよ: " + text);
      }, 250);
    }

    input.addEventListener("keydown", (e) => {
      if(e.key === "Enter" && !e.shiftKey){
        e.preventDefault();
        send();
      }
    });

    function clearChat(){
      chatInner.innerHTML = "";
      appendMessage("ai", "チャットをクリアしたよ。");
    }

    function newChat(){
      clearChat();
      appendMessage("ai", "新しいチャットを開始したよ。");
    }

    function loadDummy(n){
      clearChat();
      if(n === 1){
        appendMessage("ai", "Flask + Firebase 認証の相談だね。どこで詰まってる？");
      }else if(n === 2){
        appendMessage("ai", "LLM API の自動切換え。失敗時のフォールバック設計を話そう。");
      }else{
        appendMessage("ai", "明日の天気は晴れだよ");
      }
    }

    scrollToBottom();
  </script>
</body>
</html>
