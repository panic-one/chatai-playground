<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ホーム</title>

  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js"></script>

  <style>
    :root{
      --bg: #0b0f19;
      --panel: #0f1629;
      --panel2: #0c1324;
      --border: rgba(255,255,255,.10);
      --text: rgba(255,255,255,.92);
      --muted: rgba(255,255,255,.62);
      --muted2: rgba(255,255,255,.45);
      --bubble-user: rgba(255,255,255,.06);
      --bubble-ai: rgba(255,255,255,.10);
      --accent: #7c3aed;
      --shadow: 0 18px 50px rgba(0,0,0,.35);
      --radius: 14px;
      --danger: #ef4444;
    }

    *{ box-sizing: border-box; }
    html, body{ height: 100%; }

    body{
      margin:0;
      background:
        radial-gradient(1200px 600px at 30% -10%, rgba(124,58,237,.25), transparent 55%),
        radial-gradient(900px 500px at 90% 10%, rgba(59,130,246,.20), transparent 55%),
        var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans JP", sans-serif;
      overflow: hidden;
    }

    .app{
      height: 100svh;
      display: grid;
      grid-template-columns: 280px 1fr;
    }

    .sidebar{
      background: linear-gradient(180deg, var(--panel), var(--panel2));
      border-right: 1px solid var(--border);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: rgba(255,255,255,.03);
      box-shadow: var(--shadow);
    }

    .logo{
      width: 34px;
      height: 34px;
      border-radius: 10px;
      background: linear-gradient(135deg, rgba(124,58,237,.95), rgba(59,130,246,.95));
      display:grid;
      place-items:center;
      font-weight: 800;
      color: white;
      user-select: none;
    }

    .brand h1{
      margin:0;
      font-size: 14px;
      letter-spacing: .2px;
    }

    .brand p{
      margin:2px 0 0;
      font-size: 12px;
      color: var(--muted);
    }

    .sidebar-actions{
      display:flex;
      gap:10px;
    }

    .btn{
      appearance: none;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.04);
      color: var(--text);
      padding: 10px 12px;
      border-radius: 12px;
      cursor: pointer;
      transition: transform .08s ease, opacity .15s ease, background .15s ease;
      font-size: 13px;
      width: 100%;
    }

    .btn:hover{
      opacity: .92;
      background: rgba(255,255,255,.06);
    }

    .btn:active{
      transform: translateY(1px);
    }

    .btn.primary{
      border-color: rgba(124,58,237,.55);
      background: rgba(124,58,237,.18);
    }

    .btn.danger{
      border-color: rgba(239,68,68,.5);
      background: rgba(239,68,68,.12);
    }

    .btn.small{
      padding: 8px 10px;
      font-size: 12px;
      border-radius: 10px;
      width:auto;
    }

    .section-title{
      margin: 8px 2px 2px;
      font-size: 12px;
      color: var(--muted2);
      display:flex;
      align-items:center;
      justify-content: space-between;
      gap:10px;
    }

    .chat-list{
      display:flex;
      flex-direction: column;
      gap: 8px;
      overflow: auto;
      padding-right: 4px;
    }

    .chat-item{
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 12px;
      background: rgba(255,255,255,.03);
      cursor: pointer;
      transition: background .15s ease, border-color .15s ease;
    }

    .chat-item:hover{
      background: rgba(255,255,255,.05);
    }

    .chat-item.active{
      border-color: rgba(124,58,237,.55);
      background: rgba(124,58,237,.10);
    }

    .chat-item .title{
      font-size: 13px;
      margin:0 0 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chat-item .meta{
      font-size: 12px;
      margin:0;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .status{
      font-size: 12px;
      color: var(--muted2);
      min-height: 16px;
    }

    .status.err{
      color: rgba(239,68,68,.9);
    }

    .main{
      display:flex;
      flex-direction: column;
      height: 100%;
      min-width: 0;
      min-height: 0;
    }

    .topbar{
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      display:flex;
      align-items:center;
      justify-content: space-between;
      gap: 12px;
      background: rgba(255,255,255,.02);
      backdrop-filter: blur(8px);
    }

    .topbar .title{
      font-size: 14px;
      color: var(--muted);
      margin:0;
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
    }

    .pill{
      font-size: 12px;
      padding: 4px 8px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: rgba(255,255,255,.03);
      color: var(--muted);
      white-space: nowrap;
    }

    .thread-title{
      color: rgba(255,255,255,.86);
      font-weight: 600;
      white-space: nowrap;
      overflow:hidden;
      text-overflow: ellipsis;
      max-width: 520px;
    }

    .chat{
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 18px 18px 10px;
    }

    .chat-inner{
      max-width: 920px;
      margin: 0 auto;
      display:flex;
      flex-direction: column;
      gap: 12px;
    }

    .msg{
      display:flex;
      gap: 10px;
      align-items:flex-start;
    }

    .avatar{
      width: 34px;
      height: 34px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.04);
      display:grid;
      place-items:center;
      font-size: 12px;
      color: rgba(255,255,255,.8);
      flex: 0 0 auto;
      user-select:none;
    }

    .bubble{
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px 14px;
      line-height: 1.55;
      box-shadow: 0 8px 26px rgba(0,0,0,.25);
      max-width: 100%;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .bubble.ai{
      background: var(--bubble-ai);
    }

    .bubble.user{
      background: var(--bubble-user);
    }

    .bubble .meta{
      margin-top: 6px;
      font-size: 11px;
      color: var(--muted2);
    }

    .composer{
      border-top: 1px solid var(--border);
      background: rgba(255,255,255,.02);
      padding: 12px 14px;
    }

    .composer-inner{
      max-width: 920px;
      margin: 0 auto;
      display:flex;
      gap: 10px;
      align-items:flex-end;
    }

    textarea{
      width: 100%;
      resize: none;
      min-height: 44px;
      max-height: 180px;
      padding: 12px 12px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.03);
      color: var(--text);
      outline: none;
      font-size: 14px;
      line-height: 1.4;
    }

    textarea:focus{
      border-color: rgba(124,58,237,.55);
      box-shadow: 0 0 0 3px rgba(124,58,237,.18);
    }

    .send{
      flex: 0 0 auto;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid rgba(124,58,237,.55);
      background: rgba(124,58,237,.22);
      color: var(--text);
      cursor:pointer;
      min-width: 70px;
    }

    .send[disabled]{
      opacity:.55;
      cursor:not-allowed;
    }

    .hint{
      max-width: 920px;
      margin: 8px auto 0;
      color: var(--muted2);
      font-size: 12px;
      padding: 0 2px;
      display:flex;
      justify-content: space-between;
      gap: 12px;
    }

    .thread-row{
      display:flex;
      align-items:center;
      justify-content: space-between;
      gap: 10px;
    }

    .thread-text{
      min-width: 0;
      flex: 1 1 auto;
    }

    .thread-actions{
      flex: 0 0 auto;
      display:flex;
      gap: 8px;
    }

    .icon-btn{
      appearance:none;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.04);
      color: rgba(255,255,255,.85);
      border-radius: 10px;
      padding: 6px 8px;
      cursor:pointer;
      line-height: 1;
      font-size: 13px;
      transition: opacity .15s ease, background .15s ease, transform .08s ease;
    }

    .icon-btn:hover{
      opacity:.92;
      background: rgba(255,255,255,.06);
    }

    .icon-btn:active{
      transform: translateY(1px);
    }

    .icon-btn.danger{
      border-color: rgba(239,68,68,.5);
      background: rgba(239,68,68,.10);
    }

    @media (max-width: 860px){
      body{ overflow:auto; }
      .app{ grid-template-columns: 1fr; }
      .sidebar{ display:none; }
      .main{
        height: 100vh;
        display: flex;
        flex-direction: column;
      }
    }

    .topbar-right{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap: wrap;
    }

    .model-picker{
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap: wrap;
    }

    .model-label{
      font-size:12px;
      color: var(--muted);
    }

    .model-buttons{
      display:flex;
      gap:8px;
      flex-wrap: wrap;
    }

    .model-btn{
      appearance:none;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.04);
      color: var(--text);
      padding: 8px 10px;
      border-radius: 10px;
      cursor:pointer;
      font-size:12px;
      transition: background .15s ease, border-color .15s ease, transform .08s ease;
    }

    .model-btn:hover{
      background: rgba(255,255,255,.06);
    }

    .model-btn:active{
      transform: translateY(1px);
    }

    .model-btn.active{
      border-color: rgba(124,58,237,.55);
      background: rgba(124,58,237,.18);
    }
  </style>
</head>

<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="logo">AI</div>
        <div>
          <h1>My Chat</h1>
          <p>Firebase認証でログイン中 🎉</p>
        </div>
      </div>

      <div class="sidebar-actions">
        <button class="btn primary" type="button" onclick="newChat()">＋ 新しいチャット</button>
      </div>

      <div class="sidebar-actions">
        <button class="btn" type="button" onclick="reloadThreads()">更新</button>
        <button class="btn danger" type="button" onclick="logout()">ログアウト</button>
      </div>

      <div class="section-title">
        <span>スレッド</span>
        <span class="pill" id="threadCount">0</span>
      </div>

      <div class="chat-list" id="chatList"></div>
      <div class="status" id="sidebarStatus"></div>
    </aside>

    <main class="main">
      <header class="topbar">
        <p class="title">
          <span>チャット</span>
          <span class="thread-title" id="threadTitle"></span>
        </p>

        <div class="topbar-right">
          <div class="model-picker">
            <span class="model-label">Provider</span>
            <div class="model-buttons" id="modelButtons">
              <button class="model-btn active" type="button" data-provider="openai">GPT</button>
              <button class="model-btn" type="button" data-provider="gemini">Gemini</button>
              <button class="model-btn" type="button" data-provider="claude">Claude</button>
              <button class="model-btn" type="button" data-provider="deepseek">DeepSeek</button>
              <button class="model-btn" type="button" data-provider="auto">Auto</button>
            </div>
          </div>

          <button class="btn small" type="button" onclick="clearCurrentChatView()">クリア</button>
        </div>
      </header>

      <section class="chat" id="chat">
        <div class="chat-inner" id="chatInner">
          <div class="msg">
            <div class="avatar">AI</div>
            <div class="bubble ai">
              左の「＋ 新しいチャット」からスレッドを作って、メッセージを送ってみて。
              <div class="meta">スレッドを選ぶと履歴を読み込みます。</div>
            </div>
          </div>
        </div>
      </section>

      <footer class="composer">
        <div class="composer-inner">
          <textarea id="input" placeholder="メッセージを入力… (Enterで送信 / Shift+Enterで改行)"></textarea>
          <button class="send" id="sendBtn" type="button" onclick="send()">送信</button>
        </div>
        <div class="hint">
          <span id="mainStatus">準備中…</span>
          <span id="llmStatus">provider: openai</span>
        </div>
      </footer>
    </main>
  </div>

  <script id="firebase-config" type="application/json">
    {{ firebase_config | tojson }}
  </script>

  <script>
    const firebaseConfig = JSON.parse(
      document.getElementById("firebase-config").textContent
    );

    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    } else {
      firebase.app();
    }

    const API_BASE = "/threads";

    const chat = document.getElementById("chat");
    const chatInner = document.getElementById("chatInner");
    const input = document.getElementById("input");
    const sendBtn = document.getElementById("sendBtn");

    const chatList = document.getElementById("chatList");
    const threadCount = document.getElementById("threadCount");
    const sidebarStatus = document.getElementById("sidebarStatus");
    const mainStatus = document.getElementById("mainStatus");
    const threadTitleEl = document.getElementById("threadTitle");
    const modelButtons = document.getElementById("modelButtons");
    const llmStatus = document.getElementById("llmStatus");

    let currentThread = null;
    let currentUser = null;
    let currentProvider = "openai";
    const aiPollers = new Map();

    function scrollToBottom() {
      chat.scrollTop = chat.scrollHeight;
    }

    function setSidebarStatus(text, isErr = false) {
      sidebarStatus.textContent = text || "";
      sidebarStatus.classList.toggle("err", !!isErr);
    }

    function setMainStatus(text, isErr = false) {
      mainStatus.textContent = text || "";
      mainStatus.style.color = isErr
        ? "rgba(239,68,68,.9)"
        : "rgba(255,255,255,.55)";
    }

    function setLlmStatus(text) {
      llmStatus.textContent = text || "";
    }

    function safeJson(res) {
      return res.text().then((t) => {
        try {
          return t ? JSON.parse(t) : {};
        } catch {
          return { _raw: t };
        }
      });
    }

    let cachedToken = null;

    async function getIdToken(){
      if(cachedToken) return cachedToken;

      const user = firebase.auth().currentUser;
      if (!user) {
        throw new Error("Firebase user not found");
      }
      cachedToken = await user.getIdToken();
      return cachedToken;
    }

    async function apiFetch(path, options = {}) {
      const token = await getIdToken();

      const headers = {
        Authorization: `Bearer ${token}`,
        ...(options.headers || {}),
      };

      if (!(options.body instanceof FormData)) {
        headers["Content-Type"] = "application/json";
      }

      const res = await fetch(path, {
        credentials: "include",
        ...options,
        headers,
      });

      const body = await safeJson(res);

      if (!res.ok) {
        const msg =
          body?.error ||
          body?.message ||
          res.statusText ||
          "Request failed";
        const err = new Error(msg);
        err.status = res.status;
        err.body = body;
        throw err;
      }

      return body;
    }

    function roleLabel(role) {
      if (role === 0 || role === "user") {
        return { avatar: "You", css: "user" };
      }
      return { avatar: "AI", css: "ai" };
    }

    function setActiveModel(provider) {
      currentProvider = provider;

      const buttons = modelButtons.querySelectorAll(".model-btn");
      buttons.forEach((btn) => {
        btn.classList.toggle("active", btn.dataset.provider === provider);
      });

      setMainStatus(`準備OK / provider: ${provider}`);
      setLlmStatus(`selected provider: ${provider}`);
    }

    function stopAllPollers() {
      for (const [mid, timer] of aiPollers.entries()) {
        clearInterval(timer);
        aiPollers.delete(mid);
      }
    }

    function clearChatOnly() {
      chatInner.innerHTML = "";
    }

    function clearCurrentChatView() {
      stopAllPollers();
      clearChatOnly();

      if (currentThread) {
        appendMessage({
          role: "ai",
          content: "表示だけクリアしました。スレッドを再選択すると再読み込みできます。"
        });
      } else {
        appendMessage({
          role: "ai",
          content: "左の「＋ 新しいチャット」からスレッドを作って、メッセージを送ってみて。"
        });
      }
    }

    function appendMessage(msg) {
      const role = msg.role ?? "ai";
      const text = msg.content ?? "";
      const { avatar, css } = roleLabel(role);

      const wrap = document.createElement("div");
      wrap.className = "msg";

      const mid = String(msg.message_id ?? msg.id ?? "");
      if (mid) {
        wrap.dataset.messageId = mid;
      }

      const avatarEl = document.createElement("div");
      avatarEl.className = "avatar";
      avatarEl.textContent = avatar;

      const bubble = document.createElement("div");
      bubble.className = "bubble " + css;

      const content = document.createElement("div");
      content.className = "content";
      content.textContent = text;

      bubble.appendChild(content);

      const meta = document.createElement("div");
      meta.className = "meta";

      const parts = [];
      if (msg.status) parts.push(`status: ${msg.status}`);
      if (msg.provider) parts.push(`provider: ${msg.provider}`);
      if (msg.model) parts.push(`model: ${msg.model}`);
      if (msg.message_index != null) parts.push(`#${msg.message_index}`);
      if (msg.created_at) parts.push(msg.created_at);

      if (parts.length) {
        meta.textContent = parts.join(" / ");
        bubble.appendChild(meta);
      }

      wrap.appendChild(avatarEl);
      wrap.appendChild(bubble);
      chatInner.appendChild(wrap);

      scrollToBottom();
    }

    function updateMessageContent(messageId, newText) {
      const selector = `.msg[data-message-id="${CSS.escape(messageId)}"] .bubble .content`;
      const el = chatInner.querySelector(selector);
      if (el) {
        el.textContent = newText ?? "";
      }
      scrollToBottom();
    }

    function updateMessageMeta(messageId, msg) {
      const selector = `.msg[data-message-id="${CSS.escape(messageId)}"] .bubble .meta`;
      const el = chatInner.querySelector(selector);
      if (!el) return;

      const parts = [];
      if (msg.status) parts.push(`status: ${msg.status}`);
      if (msg.provider) parts.push(`provider: ${msg.provider}`);
      if (msg.model) parts.push(`model: ${msg.model}`);
      if (msg.message_index != null) parts.push(`#${msg.message_index}`);
      if (msg.created_at) parts.push(msg.created_at);

      el.textContent = parts.join(" / ");
    }

    function shouldStopPolling(msg) {
      return (
        msg?.status === "completed" ||
        msg?.status === "failed" ||
        msg?.status === "cancelled"
      );
    }

    function startAiPolling(threadId, messageId) {
      if (!threadId || !messageId) return;
      if (aiPollers.has(messageId)) return;

      let last = null;
      let ticks = 0;

      const timer = setInterval(async () => {
        ticks += 1;

        try {
          const msg = await apiFetch(`${API_BASE}/${threadId}/messages/${messageId}`, {
            method: "GET",
          });

          const text = msg.content ?? "";
          if (text !== last) {
            updateMessageContent(String(messageId), text);
            last = text;
          }

          updateMessageMeta(String(messageId), msg);

          if (shouldStopPolling(msg) || ticks > 240) {
            clearInterval(timer);
            aiPollers.delete(messageId);
          }
        } catch (err) {
          console.warn("poll error:", err.message);
          if (ticks > 240) {
            clearInterval(timer);
            aiPollers.delete(messageId);
          }
        }
      }, 700);

      aiPollers.set(messageId, timer);
    }

    function renderThreadList(threads) {
      chatList.innerHTML = "";
      threadCount.textContent = String(threads.length);

      for (const th of threads) {
        const item = document.createElement("div");
        item.className = "chat-item";

        const tid = th.thread_id ?? th.id;
        const curId = currentThread?.thread_id ?? currentThread?.id ?? null;

        if (curId && String(curId) === String(tid)) {
          item.classList.add("active");
        }

        const row = document.createElement("div");
        row.className = "thread-row";

        const textBox = document.createElement("div");
        textBox.className = "thread-text";

        const title = document.createElement("p");
        title.className = "title";
        title.textContent = th.title || "(no title)";

        const meta = document.createElement("p");
        meta.className = "meta";
        meta.textContent = "チャット";

        textBox.appendChild(title);
        textBox.appendChild(meta);

        const actions = document.createElement("div");
        actions.className = "thread-actions";

        const delBtn = document.createElement("button");
        delBtn.className = "icon-btn danger";
        delBtn.type = "button";
        delBtn.title = "削除";
        delBtn.textContent = "🗑";

        delBtn.addEventListener("click", async (e) => {
          e.stopPropagation();
          await deleteThread(tid);
        });

        actions.appendChild(delBtn);

        row.appendChild(textBox);
        row.appendChild(actions);
        item.appendChild(row);

        item.addEventListener("click", async () => {
          [...chatList.querySelectorAll(".chat-item")].forEach((x) => {
            x.classList.remove("active");
          });
          item.classList.add("active");
          await selectThread(th);
        });

        chatList.appendChild(item);
      }

      if (!threads.length) {
        const empty = document.createElement("div");
        empty.className = "chat-item";
        empty.style.opacity = "0.8";
        empty.innerHTML = `
          <p class="title">スレッドがありません</p>
          <p class="meta">「＋ 新しいチャット」で作成できます</p>
        `;
        chatList.appendChild(empty);
      }
    }

    async function reloadThreads() {
      try {
        setSidebarStatus("スレッド取得中…");

        const data = await apiFetch(API_BASE, { method: "GET" });

        if (!Array.isArray(data)) {
          console.error("threads response:", data);
          throw new Error("スレッド一覧の形式が不正です");
        }

        renderThreadList(data);
        setSidebarStatus("");
      } catch (err) {
        console.error(err);
        setSidebarStatus(`取得失敗: ${err.message}`, true);
      }
    }

    async function deleteThread(tid) {
      if (!tid) return;

      const ok = confirm("このスレッドを削除しますか？");
      if (!ok) return;

      try {
        setSidebarStatus("削除中…");

        await apiFetch(`${API_BASE}/${tid}`, {
          method: "DELETE",
        });

        const curId = currentThread?.thread_id ?? currentThread?.id ?? null;
        if (curId && String(curId) === String(tid)) {
          currentThread = null;
          threadTitleEl.textContent = "";
          stopAllPollers();
          clearChatOnly();
          appendMessage({
            role: "ai",
            content: "スレッドを削除しました。左から別のスレッドを選んでね。"
          });
          setMainStatus("準備OK（スレッドを選択してね）");
        }

        await reloadThreads();
        setSidebarStatus("");
      } catch (err) {
        console.error(err);
        setSidebarStatus(`削除失敗: ${err.message}`, true);
        alert(`削除に失敗: ${err.message}`);
      }
    }

    async function newChat() {
      try {
        setSidebarStatus("作成中…");

        const th = await apiFetch(API_BASE, {
          method: "POST",
          body: JSON.stringify({ title: "" }),
        });

        await reloadThreads();
        await selectThread(th);

        setSidebarStatus("");
      } catch (err) {
        console.error(err);
        setSidebarStatus(`作成失敗: ${err.message}`, true);
      }
    }

    async function selectThread(th) {
      currentThread = th;

      const tid = th.thread_id ?? th.id;
      if (!tid) {
        setMainStatus("thread_id が見つかりません", true);
        return;
      }

      threadTitleEl.textContent = th?.title ? `— ${th.title}` : "";

      stopAllPollers();
      clearChatOnly();
      appendMessage({ role: "ai", content: "履歴を読み込み中…" });

      try {
        setMainStatus("履歴取得中…");

        const msgs = await apiFetch(`${API_BASE}/${tid}/messages?limit=200&offset=0`, {
          method: "GET",
        });

        clearChatOnly();

        if (!Array.isArray(msgs) || msgs.length === 0) {
          appendMessage({
            role: "ai",
            content: "このスレッドはまだメッセージがありません。下から送ってみて。"
          });
          setMainStatus("準備OK");
          return;
        }

        msgs.sort((a, b) => {
          const diff = (a.message_index ?? 0) - (b.message_index ?? 0);
          if (diff !== 0) return diff;

          const aid = String(a.message_id ?? a.id ?? "");
          const bid = String(b.message_id ?? b.id ?? "");
          return aid.localeCompare(bid);
        });

        for (const m of msgs) {
          appendMessage(m);

          const role = m.role;
          const isUser = role === 0 || role === "user";
          const mid = String(m.message_id ?? m.id ?? "");

          if (!isUser && mid && !shouldStopPolling(m)) {
            startAiPolling(String(tid), mid);
          }
        }

        setMainStatus("準備OK");
      } catch (err) {
        console.error(err);
        clearChatOnly();
        appendMessage({
          role: "ai",
          content: `履歴取得に失敗: ${err.message}`
        });
        setMainStatus(`履歴取得失敗: ${err.message}`, true);
      }
    }

    async function send() {
      const text = input.value.trim();
      if (!text) return;

      if (!currentThread) {
        alert("先にスレッドを作って選択してね（左の＋）");
        return;
      }

      const tid = currentThread.thread_id ?? currentThread.id;
      if (!tid) {
        alert("thread_id が取れません");
        return;
      }

      sendBtn.disabled = true;
      setMainStatus("AI応答を生成中…");

      try {
        appendMessage({ role: "user", content: text });
        input.value = "";
        scrollToBottom();

        const res = await apiFetch(`${API_BASE}/${tid}/messages`, {
          method: "POST",
          body: JSON.stringify({
            content: text,
            provider: currentProvider
          }),
        });

        if (res?.thread && (res.thread.title || res.thread.thread_id || res.thread.id)) {
          currentThread = res.thread;
          threadTitleEl.textContent = res.thread.title ? `— ${res.thread.title}` : threadTitleEl.textContent;
        }

        if (res?.llm) {
          const llm = res.llm;
          setLlmStatus(
            `used provider: ${llm.provider} / model: ${llm.model} / mode: ${llm.routing_mode}`
          );
        }

        const ai = res?.ai;
        if (ai) {
          appendMessage(ai);

          const mid = String(ai.message_id ?? ai.id ?? "");
          if (mid) {
            startAiPolling(String(tid), mid);
          }
        }

        await reloadThreads();
        setMainStatus("送信完了");
      } catch (err) {
        console.error(err);
        setMainStatus(`送信失敗: ${err.message}`, true);
        alert(`送信に失敗: ${err.message}`);
      } finally {
        sendBtn.disabled = false;
      }
    }

    async function logout() {
      try {
        await firebase.auth().signOut();
        window.location.href = "/auth/login";
      } catch (error) {
        console.error("Logout failed:", error);
        alert("ログアウトに失敗しました。時間をおいて再度お試しください。");
      }
    }

    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    });

    modelButtons.addEventListener("click", (e) => {
      const btn = e.target.closest(".model-btn");
      if (!btn) return;

      const provider = btn.dataset.provider;
      if (!provider) return;

      setActiveModel(provider);
    });

    firebase.auth().onAuthStateChanged(async (user) => {
      try {
        if (!user) {
          window.location.href = "/auth/login";
          return;
        }

        currentUser = user;

        await user.getIdToken();
        await reloadThreads();
        setActiveModel("openai");
        setMainStatus("準備OK（スレッドを選択してね）");
      } catch (err) {
        console.error(err);
        setMainStatus(`初期化失敗: ${err.message}`, true);
        setSidebarStatus(`初期化失敗: ${err.message}`, true);
      }
    });
  </script>
</body>
</html>
